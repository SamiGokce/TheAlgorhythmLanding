<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Algorhythm</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .mobile-bg {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('background-mobile.png') center center / cover no-repeat;
      z-index: 0;
    }

    html {
      height: -webkit-fill-available;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    @keyframes sway {
      0%   { transform: translate(0px, 0px) scale(1.03); }
      25%  { transform: translate(-5px, 4px) scale(1.03); }
      50%  { transform: translate(4px, -4px) scale(1.03); }
      75%  { transform: translate(-4px, -3px) scale(1.03); }
      100% { transform: translate(0px, 0px) scale(1.03); }
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      animation: sway 14s ease-in-out infinite;
    }

    .bottom-nav {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(680px, 90vw);
      padding: 16px 48px;
      border-radius: 999px;

      /* liquid glass */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);

      /* hover float animation */
      animation: float 3.6s ease-in-out infinite;
      overflow: visible;
    }

    @keyframes float {
      0%   { transform: translateX(-50%) translateY(0px); }
      50%  { transform: translateX(-50%) translateY(-8px); }
      100% { transform: translateX(-50%) translateY(0px); }
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .nav-link:hover {
      color: #fff;
    }

    .waitlist-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .waitlist-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      color: #fff;
      text-shadow:
        3px 3px 0 #000,
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000;
      letter-spacing: 0.04em;
      image-rendering: pixelated;
    }

    .waitlist-input {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      border: 4px solid #fff;
      outline: none;
      padding: 20px 24px;
      width: 520px;
      letter-spacing: 0.05em;
      image-rendering: pixelated;
      box-shadow:
        6px 6px 0 #000,
        inset 2px 2px 0 rgba(255,255,255,0.1);
    }

    .waitlist-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .waitlist-input:focus {
      border-color: #fff;
      box-shadow:
        6px 6px 0 #000,
        0 0 0 2px rgba(255,255,255,0.2),
        inset 2px 2px 0 rgba(255,255,255,0.1);
    }

    .waitlist-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: #000;
      background: #fff;
      border: none;
      padding: 20px 40px;
      cursor: pointer;
      letter-spacing: 0.06em;
      image-rendering: pixelated;
      box-shadow: 6px 6px 0 #555;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .waitlist-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #555;
    }

    .waitlist-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 #555;
    }

    .waitlist-success {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: #7fff7f;
      text-shadow: 3px 3px 0 #000;
      display: none;
    }

    .bird {
      position: fixed;
      left: 20%;
      top: -300px;
      width: 180px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
    }

    .bird.fly {
      animation: birdSwoop 1.1s cubic-bezier(0.4, 0, 0.8, 1) forwards;
    }

    @keyframes birdSwoop {
      0%   { top: -300px; left: 75%; opacity: 0.8; transform: rotate(20deg); }
      100% { top: 115vh;  left: 5%;  opacity: 0.8; transform: rotate(20deg); }
    }

    .mute-btn {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 100;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, transform 0.1s;
    }

    .mute-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .mute-btn:active {
      transform: scale(0.92);
    }

    .nav-logo {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      height: 150px;
      width: auto;
      z-index: 100;
    }

    /* ── Mobile ─────────────────────────────────────── */
    @media (max-width: 600px) {

      video {
        display: none;
      }

      .mobile-bg {
        display: block;
      }




      .waitlist-wrap {
        gap: 12px;
        width: 92vw;
        transform: translate(-50%, calc(-50% + 150px));
      }

      .nav-logo {
        top: 150px;
        height: 100px;
      }

      .mobile-bg {
        animation: sway 14s ease-in-out infinite;
        transform-origin: center center;
      }

      .waitlist-label {
        font-size: 9px;
        text-align: center;
        line-height: 1.8;
      }

      .waitlist-input {
        font-size: 16px;
        width: 88vw;
        padding: 13px 12px;
        border-width: 3px;
        box-shadow: 4px 4px 0 #000, inset 2px 2px 0 rgba(255,255,255,0.1);
      }

      .waitlist-btn {
        font-size: 8px;
        padding: 13px 22px;
        box-shadow: 4px 4px 0 #555;
      }

      .waitlist-btn:hover  { box-shadow: 6px 6px 0 #555; }
      .waitlist-btn:active { box-shadow: 1px 1px 0 #555; transform: translate(3px,3px); }

      .waitlist-success {
        font-size: 8px;
      }

      .bottom-nav {
        width: 94vw;
        padding: 12px 16px;
        bottom: 20px;
        gap: 10px;
      }

      .nav-link {
        font-size: 9px;
      }

      .mute-btn {
        top: 14px;
        right: 14px;
      }

      .mute-btn svg {
        width: 30px;
        height: 24px;
      }

      .bird {
        width: 110px;
      }
    }

    /* ── Very small phones ───────────────────────────── */
    @media (max-width: 380px) {
      .waitlist-label {
        font-size: 7px;
      }

      .waitlist-input {
        font-size: 16px;
        padding: 11px 10px;
      }

      .waitlist-btn {
        font-size: 7px;
        padding: 11px 18px;
      }

      .nav-link {
        font-size: 7px;
      }

      .nav-logo {
        height: 10000px;
      }
    }

  </style>
</head>
<body>
  <div class="mobile-bg"></div>
  <video autoplay muted playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>

  <audio id="soundtrack" src="soundtrack.mp3" loop></audio>

  <button class="mute-btn" id="mute-btn" title="Toggle music">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 22" width="42" height="33" style="image-rendering:pixelated;shape-rendering:crispEdges;display:block">
      <!-- handle -->
      <rect x="0" y="8" width="2" height="6" fill="white"/>
      <!-- grip lines on handle -->
      <rect x="0" y="9" width="2" height="1" fill="#999"/>
      <rect x="0" y="11" width="2" height="1" fill="#999"/>
      <!-- speaker box -->
      <rect x="2" y="6" width="3" height="10" fill="white"/>
      <!-- grille detail -->
      <rect x="3" y="7" width="1" height="8" fill="#888"/>
      <!-- horn section -->
      <rect x="5" y="4" width="3" height="14" fill="white"/>
      <!-- bell -->
      <rect x="8" y="2" width="4" height="18" fill="white"/>
      <!-- bell rim -->
      <rect x="12" y="1" width="1" height="20" fill="white"/>
      <!-- wave 1 — small arc -->
      <rect x="14" y="7" width="1" height="1" fill="white"/>
      <rect x="13" y="8" width="1" height="6" fill="white"/>
      <rect x="14" y="14" width="1" height="1" fill="white"/>
      <!-- wave 2 — medium arc -->
      <rect x="17" y="5" width="1" height="1" fill="white"/>
      <rect x="16" y="6" width="1" height="1" fill="white"/>
      <rect x="15" y="7" width="1" height="8" fill="white"/>
      <rect x="16" y="15" width="1" height="1" fill="white"/>
      <rect x="17" y="16" width="1" height="1" fill="white"/>
      <!-- wave 3 — large arc -->
      <rect x="21" y="3" width="1" height="1" fill="white"/>
      <rect x="20" y="4" width="1" height="1" fill="white"/>
      <rect x="19" y="5" width="1" height="1" fill="white"/>
      <rect x="18" y="6" width="1" height="10" fill="white"/>
      <rect x="19" y="16" width="1" height="1" fill="white"/>
      <rect x="20" y="17" width="1" height="1" fill="white"/>
      <rect x="21" y="18" width="1" height="1" fill="white"/>
    </svg>
  </button>

  <img class="bird" id="bird" src="bird.png" alt="">

  <div class="waitlist-wrap">
    <span class="waitlist-label">JOIN THE WAITLIST</span>
    <input class="waitlist-input" type="email" placeholder="your@email.com" id="waitlist-email">
    <button class="waitlist-btn" onclick="submitWaitlist()">SUBMIT</button>
    <span class="waitlist-success" id="waitlist-success">► YOU'RE ON THE LIST!</span>
  </div>

  <img class="nav-logo" src="logo.png" alt="Algorhythm">

  <script>
    const soundtrack = document.getElementById('soundtrack');
    soundtrack.volume = 0.01;

    const muteBtn = document.getElementById('mute-btn');
    let muted = false;

    const iconOn = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 22" width="42" height="33" style="image-rendering:pixelated;shape-rendering:crispEdges;display:block">
      <rect x="0" y="8" width="2" height="6" fill="white"/>
      <rect x="0" y="9" width="2" height="1" fill="#999"/>
      <rect x="0" y="11" width="2" height="1" fill="#999"/>
      <rect x="2" y="6" width="3" height="10" fill="white"/>
      <rect x="3" y="7" width="1" height="8" fill="#888"/>
      <rect x="5" y="4" width="3" height="14" fill="white"/>
      <rect x="8" y="2" width="4" height="18" fill="white"/>
      <rect x="12" y="1" width="1" height="20" fill="white"/>
      <rect x="14" y="7" width="1" height="1" fill="white"/>
      <rect x="13" y="8" width="1" height="6" fill="white"/>
      <rect x="14" y="14" width="1" height="1" fill="white"/>
      <rect x="17" y="5" width="1" height="1" fill="white"/>
      <rect x="16" y="6" width="1" height="1" fill="white"/>
      <rect x="15" y="7" width="1" height="8" fill="white"/>
      <rect x="16" y="15" width="1" height="1" fill="white"/>
      <rect x="17" y="16" width="1" height="1" fill="white"/>
      <rect x="21" y="3" width="1" height="1" fill="white"/>
      <rect x="20" y="4" width="1" height="1" fill="white"/>
      <rect x="19" y="5" width="1" height="1" fill="white"/>
      <rect x="18" y="6" width="1" height="10" fill="white"/>
      <rect x="19" y="16" width="1" height="1" fill="white"/>
      <rect x="20" y="17" width="1" height="1" fill="white"/>
      <rect x="21" y="18" width="1" height="1" fill="white"/>
    </svg>`;

    const iconOff = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 22" width="42" height="33" style="image-rendering:pixelated;shape-rendering:crispEdges;display:block">
      <rect x="0" y="8" width="2" height="6" fill="white"/>
      <rect x="0" y="9" width="2" height="1" fill="#999"/>
      <rect x="0" y="11" width="2" height="1" fill="#999"/>
      <rect x="2" y="6" width="3" height="10" fill="white"/>
      <rect x="3" y="7" width="1" height="8" fill="#888"/>
      <rect x="5" y="4" width="3" height="14" fill="white"/>
      <rect x="8" y="2" width="4" height="18" fill="white"/>
      <rect x="12" y="1" width="1" height="20" fill="white"/>
      <!-- red X for muted -->
      <rect x="14" y="5" width="1" height="1" fill="#ff4444"/>
      <rect x="15" y="6" width="1" height="1" fill="#ff4444"/>
      <rect x="16" y="7" width="1" height="1" fill="#ff4444"/>
      <rect x="17" y="8" width="1" height="1" fill="#ff4444"/>
      <rect x="18" y="9" width="1" height="1" fill="#ff4444"/>
      <rect x="18" y="5" width="1" height="1" fill="#ff4444"/>
      <rect x="17" y="6" width="1" height="1" fill="#ff4444"/>
      <rect x="16" y="7" width="1" height="1" fill="#ff4444"/>
      <rect x="15" y="8" width="1" height="1" fill="#ff4444"/>
      <rect x="14" y="9" width="1" height="1" fill="#ff4444"/>
    </svg>`;

    muteBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      muted = !muted;
      soundtrack.muted = muted;
      muteBtn.innerHTML = muted ? iconOff : iconOn;
      if (!muted && soundtrack.paused) soundtrack.play().catch(() => {});
    });

    soundtrack.muted = true;
    soundtrack.play().then(() => {
      soundtrack.muted = false;
    }).catch(() => {
      document.addEventListener('click', function() {
        soundtrack.muted = false;
        soundtrack.play().catch(() => {});
      }, { once: true });
    });

    function playWhoosh() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const bufferSize = ctx.sampleRate * 0.6;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);

      const source = ctx.createBufferSource();
      source.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(800, ctx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.55);
      filter.Q.value = 0.8;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);

      source.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      source.start();
      source.stop(ctx.currentTime + 0.6);
    }

    function submitWaitlist() {
      const input = document.getElementById('waitlist-email');
      const success = document.getElementById('waitlist-success');
      if (input.value && input.value.includes('@')) {
        input.style.display = 'none';
        document.querySelector('.waitlist-btn').style.display = 'none';
        success.style.display = 'block';

        const bird = document.getElementById('bird');
        bird.classList.remove('fly');
        void bird.offsetWidth; // reset animation
        bird.classList.add('fly');
        playWhoosh();
      } else {
        input.style.borderColor = '#ff5555';
        setTimeout(() => input.style.borderColor = '#fff', 600);
      }
    }

    document.getElementById('waitlist-email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitWaitlist();
    });
  </script>
</body>
</html>
